  <text x="190" y="486" text-anchor="middle" fill="#64748b" font-size="11">实体 / 关系抽取与存储</text>

  <rect x="375" y="446" width="340" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
