  <text x="819" y="135" text-anchor="middle" fill="white" font-size="15" font-weight="bold">向量化与重排序加速</text>

  <rect x="564" y="156" width="510" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
  <text x="819" y="179" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">多模态向量化模型</text>
  <text x="819" y="196" text-anchor="middle" fill="#64748b" font-size="11">文本 / 图像跨模态</text>

  <rect x="564" y="212" width="510" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
  <text x="819" y="235" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">向量化模型</text>
  <text x="819" y="252" text-anchor="middle" fill="#64748b" font-size="11">本地 / TEI 服务化双形态</text>

  <rect x="564" y="268" width="510" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
  <text x="819" y="291" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">重排序模型</text>
  <text x="819" y="308" text-anchor="middle" fill="#64748b" font-size="11">检索结果精排</text>

  <rect x="564" y="324" width="510" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
  <text x="819" y="347" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">垂域微调</text>
