<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 710" font-family="'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="stage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="compat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="stack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1d5db"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>

    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>

    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>

    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="round-corner">
      <rect width="1100" height="710" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1100" height="710" rx="16" fill="url(#bg)"/>

  <rect x="0" y="0" width="1100" height="52" fill="url(#header)" clip-path="url(#round-corner)"/>

  <g transform="translate(310, 26)">
    <circle cx="0" cy="0" r="11" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <polygon points="3,-9 -5,1 1,1 -3,9 5,-1 -1,-1" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <text x="336" y="34" text-anchor="start" fill="white" font-size="18" font-weight="bold">昇腾 RAG SDK 知识检索增强架构全景图</text>

  <rect x="20" y="60" width="1060" height="32" rx="8" fill="url(#compat)" filter="url(#shadow)"/>
  <text x="550" y="81" text-anchor="middle" fill="white" font-size="14" font-weight="bold">兼容 Langchain、Dify 接口</text>

  <rect x="12" y="102" width="530" height="280" rx="10" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="558" y="102" width="522" height="280" rx="10" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="10" y="392" width="1070" height="170" rx="10" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="20" y="110" width="510" height="38" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
