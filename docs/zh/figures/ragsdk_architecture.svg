  <text x="280" y="544" text-anchor="middle" fill="#64748b" font-size="10">OpenGauss / Faiss / Milvus</text>

  <rect x="550" y="504" width="520" height="50" rx="8" fill="url(#cardBlue)" filter="url(#shadowSm)" stroke="#dbeafe" stroke-width="1"/>
  <text x="810" y="527" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">图数据库</text>
  <text x="810" y="544" text-anchor="middle" fill="#64748b" font-size="10">OpenGauss / NetworkX</text>

  <rect x="20" y="572" width="1060" height="26" rx="6" fill="url(#stack)" filter="url(#shadowSm)"/>
  <text x="40" y="590" fill="#1e40af" font-size="13" font-weight="bold">推理引擎</text>
  <text x="540" y="590" text-anchor="middle" fill="#1e40af" font-size="13">MindIE / vLLM-Ascend</text>

  <rect x="20" y="604" width="1060" height="26" rx="6" fill="url(#stack)" filter="url(#shadowSm)"/>
  <text x="40" y="622" fill="#1e40af" font-size="13" font-weight="bold">CANN</text>
  <text x="540" y="622" text-anchor="middle" fill="#1e40af" font-size="13">异构计算架构</text>

  <rect x="20" y="636" width="1060" height="26" rx="6" fill="url(#stack)" filter="url(#shadowSm)"/>
  <text x="40" y="654" fill="#1e40af" font-size="13" font-weight="bold">昇腾 / 鲲鹏硬件</text>
  <text x="540" y="654" text-anchor="middle" fill="#1e40af" font-size="13">昇腾 310 系列 | 昇腾 910 系列</text>

  <rect x="20" y="670" width="1060" height="26" rx="8" fill="url(#footerBg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="688" text-anchor="end" fill="#1e40af" font-size="13" font-weight="bold">面向昇腾 NPU</text>
  <circle cx="415" cy="683" r="2.5" fill="#94a3b8"/>
  <text x="520" y="688" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">模块化接口</text>
  <circle cx="600" cy="683" r="2.5" fill="#94a3b8"/>
  <text x="615" y="688" text-anchor="start" fill="#1e40af" font-size="13" font-weight="bold">向量模型加速</text>
